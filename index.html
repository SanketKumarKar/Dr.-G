<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr.G - AI Health Companion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Noto+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --color-primary: #818cf8;
      --color-secondary: #c084fc;
      --color-cta: #6366f1;
      --color-background: #0f172a;
      --color-text: #f8fafc;

      --brand-primary: var(--color-primary);
      --brand-primary-light: var(--color-secondary);
      --text-primary: var(--color-text);
      /* slate-50 */
      --text-secondary: #94a3b8;
      /* slate-400 */
      --bg-primary: var(--color-background);
      /* slate-900 */
      --bg-secondary: #1e293b;
      /* slate-800 */
      --border-color: #334155;
      /* slate-700 */
    }

    body {
      font-family: 'Noto Sans', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      /* slate-300 */
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
      /* slate-400 */
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-card {
      animation: fadeIn 0.5s ease-out forwards;
      opacity: 0;
      /* Start hidden before animation */
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.1/",
    "react": "https://esm.sh/react@^19.1.1",

    "@google/genai": "https://esm.sh/@google/genai@^1.14.0"
  }
}
</script>

</head>

<body>

</body>

</html>
